```html
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Streamer 100x</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 6px;
            padding: 10px;
        }
        .video-box {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            background: #111;
            border: 1px solid #333;
            border-radius: 4px;
            overflow: hidden;
        }
        .video-box iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }
    </style>
</head>
<body class="bg-[#0f0f0f] text-white font-sans overflow-x-hidden">

    <!-- Painel de Controle Superior -->
    <nav class="sticky top-0 z-50 bg-[#0f0f0f]/95 border-b border-zinc-800 p-4 backdrop-blur-sm">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row items-center gap-4">
            <div class="flex items-center gap-2 pr-4 border-r border-zinc-800">
                <span class="text-red-600 font-black text-xl tracking-tighter italic">MAX-100</span>
            </div>

            <div class="flex-1 flex w-full gap-2">
                <input 
                    type="text" 
                    id="videoUrl" 
                    placeholder="Cole o link do vídeo aqui..."
                    class="flex-1 bg-zinc-900 border border-zinc-700 rounded px-4 py-2 text-sm focus:border-red-600 outline-none transition-colors"
                >
                <button 
                    onclick="startMulti()" 
                    id="mainBtn"
                    class="bg-red-600 hover:bg-red-700 px-6 py-2 rounded font-bold text-sm transition-all active:scale-95"
                >
                    GERAR 100 JANELAS
                </button>
            </div>

            <div class="flex items-center gap-4 text-[10px] font-mono text-zinc-500 uppercase tracking-widest">
                <div>CPU: <span id="cpuSim" class="text-green-500">Normal</span></div>
                <div>Janelas: <span id="windowCount">0/100</span></div>
            </div>
        </div>
    </nav>

    <!-- Área de Exibição -->
    <main id="videoGrid" class="video-grid">
        <div class="col-span-full py-32 text-center flex flex-col items-center opacity-30">
            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" class="mb-4"><rect width="20" height="15" x="2" y="3" rx="2" ry="2"/><path d="m10 15 5-3-5-3z"/></svg>
            <p>O sistema irá carregar os vídeos em grupos para evitar bloqueio do YouTube.</p>
        </div>
    </main>

    <!-- Modal de Erro/Aviso Customizado -->
    <div id="notice" class="fixed bottom-4 right-4 bg-zinc-900 border border-zinc-800 p-4 rounded-lg shadow-2xl max-w-xs hidden">
        <p class="text-xs text-zinc-400 leading-relaxed">
            <strong class="text-white block mb-1 uppercase">Dica Anti-Bloqueio:</strong>
            Se os vídeos não carregarem, limpe os cookies do YouTube ou use uma aba anônima.
        </p>
    </div>

    <script>
        function getID(url) {
            const reg = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(reg);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        async function startMulti() {
            const url = document.getElementById('videoUrl').value;
            const id = getID(url);
            
            if (!id) {
                alert("Por favor, introduza um link válido do YouTube.");
                return;
            }

            const grid = document.getElementById('videoGrid');
            const btn = document.getElementById('mainBtn');
            const counter = document.getElementById('windowCount');

            grid.innerHTML = '';
            btn.disabled = true;
            btn.innerText = "A PROCESSAR...";
            
            document.getElementById('notice').classList.remove('hidden');

            // Estratégia: Carregar em blocos de 10 para não disparar o firewall do YouTube
            for (let i = 0; i < 100; i++) {
                const box = document.createElement('div');
                box.className = 'video-box shadow-lg';
                
                // Usando o método de embed direto que é mais difícil de bloquear do que a API
                // Adicionamos um parâmetro aleatório (t=) para o YouTube não achar que é a mesma requisição repetida
                const timestamp = new Date().getTime() + i;
                const iframe = document.createElement('iframe');
                iframe.src = `https://www.youtube.com/embed/${id}?autoplay=1&mute=1&controls=1&modestbranding=1&rel=0&vq=tiny&t=${timestamp}`;
                iframe.allow = "autoplay; encrypted-media";
                iframe.setAttribute('allowfullscreen', '');
                iframe.frameBorder = "0";
                
                box.appendChild(iframe);
                grid.appendChild(box);

                counter.innerText = `${i + 1}/100`;

                // A cada 10 vídeos, damos uma pequena pausa para o navegador "respirar"
                if ((i + 1) % 10 === 0) {
                    await new Promise(r => setTimeout(r, 800));
                } else {
                    await new Promise(r => setTimeout(r, 100));
                }
            }

            btn.disabled = false;
            btn.innerText = "REINICIAR 100 JANELAS";
        }
    </script>
</body>
</html>
